<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 220" role="img" aria-label="OPTIMUM TOUCH logo">
  <defs>
    <linearGradient id="baseGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c8fbe7"/>
      <stop offset="34%" stop-color="#75dfb5"/>
      <stop offset="68%" stop-color="#2ea97d"/>
      <stop offset="100%" stop-color="#1a5e47"/>
    </linearGradient>
    <radialGradient id="blobA" cx="22%" cy="20%" r="64%">
      <stop offset="0%" stop-color="#f1fff9" stop-opacity="0.96"/>
      <stop offset="58%" stop-color="#b7efd7" stop-opacity="0.44"/>
      <stop offset="100%" stop-color="#b7efd7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobB" cx="84%" cy="80%" r="62%">
      <stop offset="0%" stop-color="#d7f8ea" stop-opacity="0.86"/>
      <stop offset="52%" stop-color="#7ccba8" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#7ccba8" stop-opacity="0"/>
    </radialGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <filter id="logoGlow" x="-25%" y="-25%" width="170%" height="170%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#7fd7b2" flood-opacity="0.35"/>
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#0e3a2d" flood-opacity="0.22"/>
    </filter>
    <mask id="textMask">
      <rect width="620" height="220" fill="black"/>
      <text x="310" y="94" text-anchor="middle" font-family="Rubik, Arial Black, sans-serif" font-size="96" font-weight="900" letter-spacing="3" fill="white">OPTIMUM</text>
      <text x="310" y="190" text-anchor="middle" font-family="Rubik, Arial Black, sans-serif" font-size="96" font-weight="900" letter-spacing="3" fill="white">TOUCH</text>
    </mask>
  </defs>

  <g filter="url(#logoGlow)">
    <g mask="url(#textMask)">
      <rect width="620" height="220" fill="url(#baseGrad)"/>
      <ellipse cx="150" cy="58" rx="225" ry="92" fill="url(#blobA)" filter="url(#softBlur)"/>
      <ellipse cx="510" cy="172" rx="238" ry="93" fill="url(#blobB)" filter="url(#softBlur)"/>
      <path d="M8 146 C140 89, 258 188, 410 122 C500 86, 560 121, 612 111 L612 171 L8 171 Z" fill="#d8f8ea" opacity="0.18"/>
    </g>
    <text x="310" y="94" text-anchor="middle" font-family="Rubik, Arial Black, sans-serif" font-size="96" font-weight="900" letter-spacing="3" fill="none" stroke="#c9f3df" stroke-width="2.1" stroke-opacity="0.4">OPTIMUM</text>
    <text x="310" y="190" text-anchor="middle" font-family="Rubik, Arial Black, sans-serif" font-size="96" font-weight="900" letter-spacing="3" fill="none" stroke="#c9f3df" stroke-width="2.1" stroke-opacity="0.4">TOUCH</text>
  </g>
</svg>
