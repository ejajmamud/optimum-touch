<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 220" role="img" aria-label="OPTIMUM TOUCH logo">
  <defs>
    <linearGradient id="baseGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#45bb8a"/>
      <stop offset="34%" stop-color="#2f9f72"/>
      <stop offset="68%" stop-color="#1e7656"/>
      <stop offset="100%" stop-color="#0f3429"/>
    </linearGradient>
    <radialGradient id="blobA" cx="23%" cy="19%" r="63%">
      <stop offset="0%" stop-color="#e0fff1" stop-opacity="0.5"/>
      <stop offset="56%" stop-color="#8fdfbc" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#8fdfbc" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobB" cx="83%" cy="81%" r="64%">
      <stop offset="0%" stop-color="#d0f8e5" stop-opacity="0.45"/>
      <stop offset="54%" stop-color="#5db489" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#5db489" stop-opacity="0"/>
    </radialGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="logoShadow" x="-20%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#0b2b21" flood-opacity="0.32"/>
      <feDropShadow dx="0" dy="6" stdDeviation="4.5" flood-color="#0a271f" flood-opacity="0.14"/>
    </filter>
    <mask id="textMask">
      <rect width="620" height="220" fill="black"/>
      <text x="310" y="94" text-anchor="middle" font-family="Rubik, Arial Black, sans-serif" font-size="96" font-weight="900" letter-spacing="3" fill="white">OPTIMUM</text>
      <text x="310" y="190" text-anchor="middle" font-family="Rubik, Arial Black, sans-serif" font-size="96" font-weight="900" letter-spacing="3" fill="white">TOUCH</text>
    </mask>
  </defs>

  <g filter="url(#logoShadow)">
    <g mask="url(#textMask)">
      <rect width="620" height="220" fill="url(#baseGrad)"/>
      <ellipse cx="155" cy="52" rx="220" ry="90" fill="url(#blobA)" filter="url(#softBlur)"/>
      <ellipse cx="505" cy="173" rx="238" ry="95" fill="url(#blobB)" filter="url(#softBlur)"/>
      <path d="M10 145 C140 88, 260 185, 410 122 C500 84, 564 121, 610 109 L610 170 L10 170 Z" fill="#d3f7e8" opacity="0.08"/>
    </g>
    <text x="310" y="94" text-anchor="middle" font-family="Rubik, Arial Black, sans-serif" font-size="96" font-weight="900" letter-spacing="3" fill="none" stroke="#0e3a2d" stroke-width="2.2" stroke-opacity="0.42">OPTIMUM</text>
    <text x="310" y="190" text-anchor="middle" font-family="Rubik, Arial Black, sans-serif" font-size="96" font-weight="900" letter-spacing="3" fill="none" stroke="#0e3a2d" stroke-width="2.2" stroke-opacity="0.42">TOUCH</text>
  </g>
</svg>
